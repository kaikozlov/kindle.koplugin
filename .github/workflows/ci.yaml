name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-lua:
    name: Lua Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Pull koplugin-dev image
        run: make setup

      - name: Run Lua tests
        run: make test

  test-drm-compatibility:
    name: DRM Compatibility Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Match the CPython runtime bundled by python_build.sh.
          python-version: "3.11"

      - name: Install Python test dependencies
        run: python3 -m pip install --disable-pip-version-check pycryptodome==3.23.0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run DRM compatibility tests
        run: python3 -m unittest discover -s python/tests -p 'test_*.py' -v
