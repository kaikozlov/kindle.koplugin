commands:
  build: go build ./cmd/kindle-helper/
  test: go test ./internal/kfx/ -count=1 -timeout 120s
  test_all: go test ./... -count=1 -timeout 180s
  typecheck: go vet ./...
  lint: go vet ./...
  parity_check: bash scripts/parity_check.sh
  diff_parity: bash scripts/diff_kfx_parity.sh --summary-only --ignore-modified
  audit_branches: python3 scripts/audit_branches.py

services: {}
